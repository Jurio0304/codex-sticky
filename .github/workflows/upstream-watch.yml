name: upstream-watch

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    name: Watch OpenAI Codex releases
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check latest stable upstream release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(gh api 'repos/openai/codex/releases?per_page=30' --jq 'map(select((.draft | not) and (.prerelease | not)))[0].tag_name // ""')"
          if [[ -z "$latest_tag" ]]; then
            echo "No stable upstream release found" >&2
            exit 1
          fi

          read -r base_tag synced_ref synced_commit < <(python3 - <<'PY'
          import json

          with open(".sticky/upstream-base.json", encoding="utf-8") as handle:
              data = json.load(handle)
          tag = data["latest_stable_release"]["tag"]
          if not isinstance(tag, str) or not tag:
              raise SystemExit("latest_stable_release.tag must be a non-empty string")
          synced_ref = data["synced_ref"]
          synced_commit = data["synced_commit"]
          if not isinstance(synced_ref, str) or not synced_ref:
              raise SystemExit("synced_ref must be a non-empty string")
          if not isinstance(synced_commit, str) or not synced_commit:
              raise SystemExit("synced_commit must be a non-empty string")
          print(tag, synced_ref, synced_commit)
          PY
          )"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "base_tag=$base_tag" >> "$GITHUB_OUTPUT"
          echo "synced_ref=$synced_ref" >> "$GITHUB_OUTPUT"
          echo "synced_commit=$synced_commit" >> "$GITHUB_OUTPUT"
          if [[ "$latest_tag" != "$base_tag" ]]; then
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create reminder issue
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_TAG: ${{ steps.check.outputs.latest_tag }}
          BASE_TAG: ${{ steps.check.outputs.base_tag }}
          SYNCED_REF: ${{ steps.check.outputs.synced_ref }}
          SYNCED_COMMIT: ${{ steps.check.outputs.synced_commit }}
        shell: bash
        run: |
          set -euo pipefail
          title="Sticky upstream release available: ${LATEST_TAG}"
          titles="$(gh issue list --state open --search "in:title \"$title\"" --json title --jq '.[].title')"
          if grep -Fxq "$title" <<< "$titles"; then
            echo "Reminder issue already exists for ${LATEST_TAG}"
            exit 0
          fi

          printf -v body 'OpenAI Codex has a newer stable release `%s`.\n\nSticky records latest stable release metadata as `%s`.\n\nThe currently synced upstream code is `%s` at `%s`; the recorded latest stable release tag is not treated as the code baseline unless it has been explicitly synced.\n\nThis workflow only creates a reminder issue. It does not merge upstream, modify code, create tags, or publish a release.' \
            "$LATEST_TAG" "$BASE_TAG" "$SYNCED_REF" "$SYNCED_COMMIT"
          gh issue create --title "$title" --body "$body"
