name: upstream-watch

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    name: Watch OpenAI Codex releases
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check latest stable upstream release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(gh api repos/openai/codex/releases --jq 'map(select((.draft | not) and (.prerelease | not)))[0].tag_name // ""')"
          if [[ -z "$latest_tag" ]]; then
            echo "No stable upstream release found" >&2
            exit 1
          fi

          base_tag="$(python3 - <<'PY'
          import json

          with open(".sticky/upstream-base.json", encoding="utf-8") as handle:
              tag = json.load(handle)["latest_stable_tag"]["name"]
          if not isinstance(tag, str) or not tag:
              raise SystemExit("latest_stable_tag.name must be a non-empty string")
          print(tag)
          PY
          )"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "base_tag=$base_tag" >> "$GITHUB_OUTPUT"
          if [[ "$latest_tag" != "$base_tag" ]]; then
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create reminder issue
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_TAG: ${{ steps.check.outputs.latest_tag }}
          BASE_TAG: ${{ steps.check.outputs.base_tag }}
        shell: bash
        run: |
          set -euo pipefail
          title="Sticky upstream release available: ${LATEST_TAG}"
          titles="$(gh issue list --state open --search "in:title \"$title\"" --json title --jq '.[].title')"
          if grep -Fxq "$title" <<< "$titles"; then
            echo "Reminder issue already exists for ${LATEST_TAG}"
            exit 0
          fi

          printf -v body 'OpenAI Codex has a newer stable release `%s`.\n\nCurrent Sticky upstream baseline records `%s`.\n\nThis workflow only creates a reminder issue. It does not merge upstream, modify code, create tags, or publish a release.' \
            "$LATEST_TAG" "$BASE_TAG"
          gh issue create --title "$title" --body "$body"
