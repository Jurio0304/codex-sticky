name: sticky-release

on:
  push:
    tags:
      - "v*-sticky.*"

permissions:
  contents: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  TARGET: x86_64-unknown-linux-gnu

jobs:
  linux-x86_64:
    name: Linux x86_64 release
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate release tag
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          lower="${tag,,}"
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*-sticky\.[0-9]+$ ]]; then
            echo "Tag must match v<upstream-version>-sticky.<revision>: $tag" >&2
            exit 1
          fi
          if [[ "$lower" =~ (alpha|beta|rc|pre|preview|canary|nightly|dev) ]]; then
            echo "Prerelease semantics are not allowed in Sticky release tags: $tag" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Build codex
        run: cargo build --release --bin codex
      - name: Package codex-sticky
        id: package
        shell: bash
        run: |
          set -euo pipefail
          release_name="codex-sticky-${GITHUB_REF_NAME}-${TARGET}"
          archive_name="${release_name}.tar.gz"
          package_dir="${RUNNER_TEMP}/${release_name}"
          archive="${RUNNER_TEMP}/${archive_name}"
          checksums="${RUNNER_TEMP}/SHA256SUMS"

          mkdir -p "$package_dir"
          cp target/release/codex "${package_dir}/codex-sticky"
          cp ../LICENSE ../NOTICE "$package_dir/"
          tar -C "$package_dir" -czf "$archive" codex-sticky LICENSE NOTICE
          (cd "$RUNNER_TEMP" && sha256sum "$archive_name" > SHA256SUMS)

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksums=$checksums" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.checksums }}" \
            --title "$GITHUB_REF_NAME" \
            --notes "codex-sticky Linux x86_64 build for ${TARGET}."
